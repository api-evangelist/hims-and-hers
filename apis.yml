name: Hims & Hers Health
type: Index
kind: company
description: >-
  Hims & Hers Health, Inc. (NYSE: HIMS) is a direct-to-consumer telehealth
  platform headquartered in San Francisco that connects consumers with
  licensed providers and ships personalized treatments across men's and
  women's health categories. Hims serves men with offerings spanning sexual
  health, hair loss, mental health, dermatology, and weight loss; Hers serves
  women with birth control, hair, skin, mental health, and weight management;
  both brands include compounded GLP-1 weight-loss programs. International
  expansion has been driven by the acquisitions of ZAVA (Europe, 2025) and
  Eucalyptus Health (Australia, 2026). Hims & Hers is primarily a consumer
  D2C product; no public developer API has been identified, and B2B and
  partner integrations are gated. This entry catalogs the company surface for
  the API Evangelist index.
